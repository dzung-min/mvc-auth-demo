<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mvc Auth Demo</title>
</head>

<body>
    <h1>Register</h1>
    <p th:if="${email_duplicated}">Email is already in use</p>
    <form th:action="@{/register}" method="post" th:object="${user}">
        <div>
            <label for="email">Email</label>
            <input type="email" th:field="*{email}" id="email" required>
            <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
        </div>
        <div>
            <label for="password">Password</label>
            <input type="password" th:field="*{password}" id="password" required>
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
        </div>
        <div>
            <label for="confirm-password">Confirm Password</label>
            <input type="password" th:field="*{confirmPassword}" id="confirm-password" required>
            <p th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
        </div>
        <div>
            <input type="submit" value="Register">
            <a th:href="@{/login}">Login</a>
        </div>
    </form>
</body>

</html>
