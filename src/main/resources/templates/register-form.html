<!DOCTYPE html>
<html lang="en" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout.html}">

<head>
    <title>Register</title>
</head>

<body>
    <section layout:fragment="content">
        <div class="row">
            <div class="col-md-6 mx-auto">
                <h1 class="text-center">Register</h1>
                <p class="alert alert-warning" role="alert" th:if="${errorMessage}" th:text="${errorMessage}"></p>
                <form th:action="@{/register}" method="post" th:object="${user}">
                    <div class="mt-3">
                        <label class="form-label" for="email">Email</label>
                        <input class="form-control" type="email" th:field="*{email}" id="email" required>
                        <p class="fst-italic text-danger fs-6 fw-lighter mt-2" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                    </div>
                    <div class="mt-3">
                        <label class="form-label" for="password">Password</label>
                        <input class="form-control" type="password" th:field="*{password}" id="password" required>
                        <p class="fst-italic text-danger fs-6 fw-lighter mt-2" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                    </div>
                    <div class="mt-3">
                        <label class="form-label" for="confirm-password">Confirm Password</label>
                        <input class="form-control" type="password" th:field="*{confirmPassword}" id="confirm-password" required>
                        <p class="fst-italic text-danger fs-6 fw-lighter mt-2" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
                    </div>
                    <div class="mt-5">
                        <input class="btn btn-primary" type="submit" value="Register">
                        <a class="btn btn-secondary" th:href="@{/login}">Login</a>
                    </div>
                </form>
            </div>
        </div>
    </section>
</body>

</html>
