<!DOCTYPE html>
<html lang="en" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout.html}">
<head>
    <title>Login</title>
</head>
<body>
    <section layout:fragment="content">
        <div class="row">
            <div class="col-md-6 mx-auto">
                <h1 class="text-center">Login</h1>
                <p class="alert alert-success" role="alert" th:if="${successMessage}" th:text="${successMessage}"></p>
                <p class="alert alert-warning" role="alert" th:if="${param.error}">Invalid email and password</p>
                <form th:action="@{/login}" method="post">
                    <div class="mt-3">
                        <label for="email" class="form-label">Email</label>
                        <input class="form-control" type="email" id="email" name="email" required>
                    </div>
                    <div class="mt-3">
                        <label for="password" class="form-label">Password</label>
                        <input class="form-control" type="password" name="password" id="password" required>
                    </div>
                    <div class="mt-5">
                        <input class="btn btn-primary" type="submit" value="Login">
                        <a class="btn btn-secondary" th:href="@{/register}">Register</a>
                    </div>
                    <a class="link-info" th:href="@{/forget-password}">Forget Password</a>
                </form>
            </div>
        </div>

    </section>
</body>
</html>
